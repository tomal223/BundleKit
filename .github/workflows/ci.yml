name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test, typecheck, lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Includes the ghost discount prevention suite — MUST stay green.
      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy extensions (release only)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Requires SHOPIFY_CLI_PARTNERS_TOKEN secret in the repo settings.
      # Uncomment once the app is linked in the Partner Dashboard:
      # - run: npx shopify app deploy --force
      #   env:
      #     SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
      - run: echo "Enable the deploy step after linking the app (see README)"

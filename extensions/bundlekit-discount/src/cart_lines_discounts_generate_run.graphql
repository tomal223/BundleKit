query CartInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  shop {
    metafield(namespace: "$app:bundlekit", key: "offers") {
      value
    }
  }
  discount {
    discountClasses
  }
}
